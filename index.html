<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Barra Scanner</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <header class="app-header top">
      <div class="pill"><span id="dot" class="dot"></span><span>Barra Scanner</span></div>
      <script src="https://unpkg.com/html5-qrcode"></script>
      <button class="icon-btn" id="sync-btn" aria-label="Sincronizar"><span>⟳</span></button>
    </header>

    <main class="app-main">
      <section class="camera-stage">
        <div id="scanner-view">
          <div id="reader"></div>
        </div>
        <div class="stage">
          <div id="frame"></div>
        </div>
      </section>
      <section class="status-wrap">
        <div class="status">
          <div class="shead"><span id="mode-tag">MODO FULL</span><span id="offline"
              style="display:none;color:#ff9ca8;font-weight:700">SIN CONEXION</span></div>
          <div id="live" class="live">Listo para escanear</div>
          <div class="metrics"><span class="m" id="m-total">0 registros</span><span class="m" id="m-pending">0
              pendientes</span><span class="m" id="m-batch">Batch off</span></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <div class="recent-scans-footer">
        <div id="recent-scans-container"><span class="recent-placeholder">Últimos registros...</span></div>
      </div>
      <nav id="nav"><button class="n" id="n-history"><span>▦</span><span>Historial</span></button><button class="n"
          id="n-image"><span>◩</span><span>Imagen</span></button><button class="n"
          id="n-nfc"><span>📡</span><span>NFC</span></button><button class="n"
          id="n-sync"><span>↻</span><span>Sync</span></button><button class="n"
          id="n-settings"><span>⚙</span><span>Ajustes</span></button><input id="file" type="file" accept="image/*"
          style="display:none" /></nav>
    </footer>
  </div>
  <div id="flash"></div>
  <div id="toast"></div>
  <div id="big-alert" class="big-alert">
    <div id="ba-box" class="ba-box">
      <span id="ba-icon" class="ba-icon">⚠️</span>
      <div id="ba-title" class="ba-title">DUPLICADO</div>
      <div id="ba-code" class="ba-code">...</div>
      <button id="ba-btn" class="ba-btn">CERRAR</button>
    </div>
  </div>
  <div id="confirm-modal" class="big-alert">
    <div class="ba-box">
      <span id="cm-icon" class="ba-icon"></span>
      <div id="cm-title" class="ba-title"></div>
      <p id="cm-message" class="ba-message"></p>
      <div class="ba-actions">
        <button id="cm-cancel-btn" class="btn">Cancelar</button>
        <button id="cm-confirm-btn" class="btn btn-danger">Confirmar</button>
      </div>
    </div>
  </div>
  <div id="backdrop" class="backdrop"></div>
  <section id="history" class="panel" aria-hidden="true">
    <header class="ph">
      <div class="title">Historial</div><button class="icon-btn" data-close="history">✕</button>
    </header>
    <div class="pc"><input id="search" class="input" placeholder="Buscar codigo" />
      <div class="tabs"><button class="tab on" data-filter="all">Todo</button><button class="tab"
          data-filter="pending">Pendientes</button><button class="tab" data-filter="sent">Enviados</button></div>
      <ul id="log"></ul>
    </div>
  </section>
  <section id="settings" class="panel" aria-hidden="true">
    <header class="ph">
      <div class="title">Ajustes</div><button class="icon-btn" data-close="settings">✕</button>
    </header>
    <div class="pc">
      <div class="user-info">
        <img id="user-avatar-img" class="user-avatar" src="" />
        <div style="flex:1">
          <div style="font-size:10px;color:#888">CONECTADO COMO</div>
          <div id="user-display-name" class="user-name">...</div>
        </div>
        <button id="logout-btn" class="btn btn-danger" style="padding:6px 12px;font-size:12px">Salir</button>
      </div>
      <div style="margin-bottom:14px"><label class="label">Modo de escaneo</label>
        <div class="seg"><button id="mode-full" class="mode on" type="button">FULL PI</button><button id="mode-short"
            class="mode" type="button">SHORT</button></div>
      </div>
      <div style="margin-bottom:14px"><label class="label">Batch</label>
        <div class="row"><span>Activar escaneo por lote</span><label class="sw"><input type="checkbox"
              id="batch-toggle" /><span class="sl"></span></label></div><select id="batch-layout" class="select"
          disabled>
          <option value="QWERTY">QWERTY</option>
          <option value="AZERTY">AZERTY</option>
          <option value="QWERTZU">QWERTZU</option>
        </select>
      </div>
      <div style="margin-bottom:14px"><label class="label">Validacion</label>
        <div class="row"><span>OCR correction (O a 0)</span><label class="sw"><input type="checkbox"
              id="ocr-toggle" /><span class="sl"></span></label></div><input id="full-prefix" class="input"
          placeholder="Full prefix" /><input id="short-prefix" class="input" placeholder="Short prefix"
          style="margin-top:8px" />
      </div>
      <div><label class="label">Datos locales</label><button id="export-btn" class="btn"
          style="width:100%;margin-bottom:8px">Exportar CSV</button><button id="clear-btn" class="btn btn-danger"
          style="width:100%">Borrar historial local</button></div>
    </div>
  </section>
  <script type="module" src="app.js"></script>
</body>

</html>
