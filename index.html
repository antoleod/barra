<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barra Scanner Pro</title>
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* --- MODERN APP-LIKE STYLES --- */
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-light: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #0A84FF;
            --success-color: #30d158;
            --warning-color: #ff9f0a;
            --danger-color: #ff453a;
            --border-color: #333333;
            --font-stack: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            --bottom-nav-height: 65px;
            --panel-header-height: 60px;
        }

        body { 
            font-family: var(--font-stack);
            background: var(--bg-color); 
            color: var(--text-primary); 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- SCANNER AREA --- */
        #scanner-view {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 1;
        }
        #reader { 
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #reader video {
            transform: scale(1); /* Fix for some Android browsers */
        }

        #viewfinder {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 50vmax solid rgba(0,0,0,0.5);
            box-shadow: inset 0 0 0 3px white;
            width: 280px; height: 150px;
            margin: auto;
            transition: box-shadow 0.2s ease-in-out;
        }
        #viewfinder.success { box-shadow: inset 0 0 0 5px var(--success-color); }
        #viewfinder.warning { box-shadow: inset 0 0 0 5px var(--warning-color); }

        /* --- UI OVERLAYS & CONTROLS --- */
        .top-controls {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }
        .icon-btn {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 44px; height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        #offline-badge {
            background: var(--danger-color);
            color: white;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* --- BOTTOM NAVIGATION --- */
        #bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--bottom-nav-height);
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-secondary);
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.7rem; gap: 4px; padding: 8px;
            cursor: pointer;
        }
        .nav-btn .icon { font-size: 1.5rem; }
        .nav-btn.active { color: var(--accent-color); }

        /* --- SLIDE-UP PANELS (HISTORY, SETTINGS) --- */
        .panel {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: calc(100% - 80px); /* Leave space at top */
            background: var(--surface-color);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .panel.visible {
            transform: translateY(0);
        }
        .panel-header {
            flex-shrink: 0;
            padding: 0 20px;
            height: var(--panel-header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .panel-header::before { /* Grabber handle */
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 5px;
            background: var(--border-color);
            border-radius: 3px;
        }
        .panel-header h2 { margin: 0; font-size: 1.2rem; }
        .panel-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        /* --- HISTORY PANEL SPECIFICS --- */
        #history-controls { padding: 16px 0; }
        #search-input {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: none;
            background: var(--surface-light); color: white; box-sizing: border-box; font-size: 1rem;
        }
        .tabs { display: flex; gap: 16px; margin-top: 16px; }
        .tab {
            font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; padding-bottom: 8px;
            border-bottom: 2px solid transparent; font-weight: 500;
        }
        .tab.active { color: var(--text-primary); border-color: var(--accent-color); font-weight: 600; }

        #log-content { padding: 0; list-style: none; margin: 0; }
        .log-item {
            background: var(--surface-light);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }
        .item-info { display: flex; flex-direction: column; gap: 8px; }
        .item-code { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 1.1rem; font-weight: 600; word-break: break-all; }
        .item-meta { font-size: 0.8rem; color: var(--text-secondary); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .badge { padding: 3px 8px; border-radius: 16px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge-full { background: rgba(10, 132, 255, 0.2); color: #64d2ff; }
        .badge-short { background: rgba(255, 159, 10, 0.2); color: #ffd60a; }
        .badge-pending { background: #444; color: #ccc; }
        .badge-sent { background: rgba(48, 209, 88, 0.2); color: #30d158; }
        .badge-used { background: rgba(255, 69, 58, 0.2); color: #ff453a; }

        .item-actions .btn-secondary {
            padding: 6px 12px; font-size: 0.8rem; margin-top: 0;
        }

        /* --- SETTINGS PANEL & GENERAL FORM STYLES --- */
        .setting-group { margin-bottom: 24px; }
        .setting-label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .setting-input { width: 100%; background: var(--surface-light); border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .help-text { font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.5; }
        .help-text code { background: #444; padding: 2px 5px; border-radius: 4px; }

        .switch-group { display: flex; justify-content: space-between; align-items: center; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--surface-light); transition: .4s; border-radius: 28px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 600; font-size: 1rem; margin-top: 12px; cursor: pointer; }
        .btn-primary { background: var(--accent-color); color: white; }
        .btn-secondary { background: var(--surface-light); color: white; }
        .btn-danger { background: rgba(255, 69, 58, 0.2); color: var(--danger-color); }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container {
            position: fixed;
            bottom: calc(var(--bottom-nav-height) + 16px);
            left: 16px; right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface-light);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: all;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.success { background: var(--success-color); color: black; }
        .toast.warning { background: var(--warning-color); color: black; }
        .toast.error { background: var(--danger-color); color: white; }

    </style>
</head>
<body>

    <!-- MAIN SCANNER VIEW -->
    <div id="scanner-view">
        <div id="reader"></div>
        <div id="viewfinder"></div>

        <div class="top-controls">
            <span id="offline-badge" class="badge badge-used" style="display:none;">OFFLINE</span>
            <button class="icon-btn" id="sync-btn" title="Sync">🔄</button>
        </div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container"></div>

    <!-- HISTORY PANEL (SLIDES UP) -->
    <div id="history-panel" class="panel">
        <div class="panel-header">
            <h2>History</h2>
        </div>
        <div class="panel-content">
            <div id="history-controls">
                <input type="text" id="search-input" placeholder="🔍 Search code...">
                <div class="tabs">
                    <div class="tab active" onclick="app.filterList('all')">All</div>
                    <div class="tab" onclick="app.filterList('pending')">Pending</div>
                    <div class="tab" onclick="app.filterList('sent')">Sent</div>
                </div>
            </div>
            <ul id="log-content"></ul>
        </div>
    </div>

    <!-- SETTINGS PANEL (SLIDES UP) -->
    <div id="settings-panel" class="panel">
        <div class="panel-header">
            <h2>Settings</h2>
        </div>
        <div class="panel-content">
            <div class="setting-group">
                <label class="setting-label">Scan Mode</label>
                <div style="display:flex; background:var(--surface-light); border-radius:12px; padding:4px;">
                    <button class="mode-btn active" id="mode-full" onclick="app.setMode('FULL')">FULL PI</button>
                    <button class="mode-btn" id="mode-short" onclick="app.setMode('SHORT')">SHORT</button>
                </div>
            </div>

            <div class="setting-group">
                <label class="setting-label">Batch Mode</label>
                <div class="switch-group">
                    <span>Enable Batch Scanning</span>
                    <label class="switch"><input type="checkbox" id="batch-toggle" onchange="app.toggleBatchMode()"><span class="slider"></span></label>
                </div>
                <select id="batch-layout" class="setting-input" onchange="app.setBatchLayout(this.value)" disabled style="margin-top:12px;">
                    <option value="QWERTY">QWERTY Layout</option>
                    <option value="AZERTY">AZERTY Layout</option>
                    <option value="QWERTZU">QWERTZU Layout</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Cloud Sync</label>
                <input type="text" id="script-url-input" class="setting-input" placeholder="Google Apps Script URL">
            </div>

            <div class="setting-group">
                <label class="setting-label">Validation Rules</label>
                <div class="switch-group" style="margin-bottom:12px;">
                    <span>OCR Correction (0/O)</span>
                    <label class="switch"><input type="checkbox" id="ocr-toggle"><span class="slider"></span></label>
                </div>
                <input type="text" id="full-prefix" class="setting-input" placeholder="Full Prefix (e.g. 02PI20)">
                <input type="text" id="short-prefix" class="setting-input" placeholder="Short Prefix (e.g. MUSTBRUN)" style="margin-top:8px;">
            </div>

            <div class="setting-group">
                <label class="setting-label">Data Management</label>
                <button class="btn btn-secondary" onclick="app.exportCSV()">Export as CSV</button>
                <button class="btn btn-danger" onclick="app.clearDatabase()">Clear All Local Data</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION BAR -->
    <nav id="bottom-nav">
        <button class="nav-btn" id="nav-history-btn">
            <span class="icon">📄</span>
            <span>History</span>
        </button>
        <button class="nav-btn" id="nav-scan-file-btn">
            <span class="icon">🖼️</span>
            <span>Scan Image</span>
        </button>
        <input type="file" id="scan-file-input" accept="image/*" style="display: none;">
        <button class="nav-btn" id="nav-settings-btn">
            <span class="icon">⚙️</span>
            <span>Settings</span>
        </button>
    </nav>

    <script>
        /**
         * BARRA SCANNER PRO - Single File Architecture
         * Modules: Storage (IndexedDB), Logic (Validation/Conversion), UI, App (Controller)
         */

        // --- 1. STORAGE MODULE (IndexedDB) ---
        const db = {
            dbName: 'BarraScannerDB',
            version: 1,
            instance: null,

            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('scans')) {
                            const store = db.createObjectStore('scans', { keyPath: 'id', autoIncrement: true });
                            store.createIndex('code_normalized', 'code_normalized', { unique: false });
                            store.createIndex('status', 'status', { unique: false });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.instance = e.target.result;
                        resolve(this.instance);
                    };
                    request.onerror = (e) => reject(e);
                });
            },

            async addScan(scanData) {
                return new Promise((resolve, reject) => {
                    const tx = this.instance.transaction(['scans'], 'readwrite');
                    const store = tx.objectStore('scans');
                    const request = store.add(scanData);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async getAll() {
                return new Promise((resolve) => {
                    const tx = this.instance.transaction(['scans'], 'readonly');
                    const request = tx.objectStore('scans').getAll();
                    request.onsuccess = () => resolve(request.result);
                });
            },

            async updateStatus(id, status) {
                const tx = this.instance.transaction(['scans'], 'readwrite');
                const store = tx.objectStore('scans');
                const item = await new Promise(r => store.get(id).onsuccess = e => r(e.target.result));
                if(item) {
                    item.status = status;
                    store.put(item);
                }
            },

            async markUsed(id) {
                const tx = this.instance.transaction(['scans'], 'readwrite');
                const store = tx.objectStore('scans');
                const item = await new Promise(r => store.get(id).onsuccess = e => r(e.target.result));
                if(item) {
                    item.used = true;
                    item.dateUsed = new Date().toISOString();
                    store.put(item);
                }
            },

            async clear() {
                const tx = this.instance.transaction(['scans'], 'readwrite');
                tx.objectStore('scans').clear();
                return new Promise(r => tx.oncomplete = r);
            }
        };

        // --- 2. LOGIC MODULE (Validation & Conversion) ---
        const logic = {
            settings: {
                fullPrefix: '02PI20',
                shortPrefix: 'MUSTBRUN',
                ocrCorrection: true,
                formUrl: '',
                scriptUrl: 'https://script.google.com/macros/s/AKfycbzAGUpxnCXDsr7llJlh_75rKdnwd5xJJIxWJVXy9ekUzqII6lTCpAiKVuYVfGQ_V8dWwA/exec'
            },

            loadSettings() {
                const saved = localStorage.getItem('barra_settings');
                if (saved) this.settings = { ...this.settings, ...JSON.parse(saved) };
                
                // UI Sync
                document.getElementById('full-prefix').value = this.settings.fullPrefix;
                document.getElementById('short-prefix').value = this.settings.shortPrefix;
                document.getElementById('ocr-toggle').checked = this.settings.ocrCorrection;
                document.getElementById('form-url-input').value = this.settings.formUrl;
                document.getElementById('script-url-input').value = this.settings.scriptUrl || '';
            },

            saveSettings() {
                this.settings.fullPrefix = document.getElementById('full-prefix').value.trim();
                this.settings.shortPrefix = document.getElementById('short-prefix').value.trim();
                this.settings.ocrCorrection = document.getElementById('ocr-toggle').checked;
                this.settings.formUrl = document.getElementById('form-url-input').value.trim();
                this.settings.scriptUrl = document.getElementById('script-url-input').value.trim();
                localStorage.setItem('barra_settings', JSON.stringify(this.settings));
            },

            normalize(code) {
                let clean = code.trim().toUpperCase().replace(/\s+/g, '');
                if (this.settings.ocrCorrection) {
                    // Fix: Only replace O->0. I->1 breaks '02PI' prefix.
                    clean = clean.replace(/O/g, '0');
                }
                return clean;
            },

            convert(code, targetMode) {
                const clean = this.normalize(code);
                const fullP = this.settings.fullPrefix;
                const shortP = this.settings.shortPrefix;

                // Detect current format
                const isFull = clean.startsWith(fullP);
                const isShort = clean.startsWith(shortP) || (!isFull && /^[A-Z0-9]+$/.test(clean));

                if (targetMode === 'SHORT') {
                    if (isShort) return clean; // Already short
                    if (isFull) {
                        // Logic: Remove Full Prefix, Remove last 2 chars (checksum?), Prepend Short Prefix
                        // Example: 02PI20 2308508 22 -> MUSTBRUN 2308508
                        const core = clean.substring(fullP.length, clean.length - 2); 
                        return shortP + core;
                    }
                } else { // Target FULL
                    if (isFull) return clean;
                    if (isShort) {
                        // Logic: Remove Short Prefix, Prepend Full Prefix, Add dummy checksum '00'
                        let core = clean;
                        if (clean.startsWith(shortP)) core = clean.substring(shortP.length);
                        return fullP + core + '00'; 
                    }
                }
                return null; // Conversion failed
            },

            validate(code, mode) {
                const clean = this.normalize(code);
                if (clean.length < 5) return false;
                if (mode === 'FULL' && !clean.startsWith(this.settings.fullPrefix)) return false;
                return true;
            }
        };

        // --- 3. APP CONTROLLER ---
        const app = {
            mode: 'FULL', // FULL or SHORT
            scans: [],
            tempScan: null,
            filter: 'all',
            scanner: null,
            batchMode: false,
            batchCount: 0,
            batchLayout: 'QWERTY',
            laserSound: new Audio("https://assets.mixkit.co/active_storage/sfx/600/600-preview.mp3"),
            syncIntervalId: null,

            async init() {
                await db.init();
                logic.loadSettings();
                this.bindEvents();
                this.loadScans();
                this.startScanner();
                this.updateOnlineStatus();
                this.startAutoSync();
            },

            bindEvents() {
                document.getElementById('sync-btn').onclick = () => this.runFullSync();
                document.getElementById('search-input').oninput = (e) => this.renderList(e.target.value);

                document.getElementById('nav-history-btn').onclick = () => this.showPanel('history-panel');
                document.getElementById('nav-settings-btn').onclick = () => this.showPanel('settings-panel');
                document.getElementById('scan-file-btn').onclick = () => document.getElementById('scan-file-input').click();
                document.getElementById('scan-file-input').onchange = (e) => this.scanImageFile(e);
                
                // Settings inputs save on blur
                document.querySelectorAll('.setting-input').forEach(el => el.onblur = () => logic.saveSettings());
                document.getElementById('ocr-toggle').onchange = () => logic.saveSettings();

                window.addEventListener('online', () => {
                    this.updateOnlineStatus();
                    this.startAutoSync();
                });
                window.addEventListener('offline', () => {
                    this.updateOnlineStatus();
                    this.stopAutoSync();
                });
            },

            updateOnlineStatus() {
                const badge = document.getElementById('offline-badge');
                badge.style.display = navigator.onLine ? 'none' : 'block';
            },

            showPanel(panelId) {
                // Close any open panels first
                document.querySelectorAll('.panel.visible').forEach(p => p.classList.remove('visible'));
                // Open the requested panel
                const panel = document.getElementById(panelId);
                if (panel) {
                    panel.classList.add('visible');
                }
            },

            setMode(newMode) {
                this.mode = newMode;
                document.getElementById('mode-full').className = `mode-btn ${newMode === 'FULL' ? 'active' : ''}`;
                document.getElementById('mode-short').className = `mode-btn ${newMode === 'SHORT' ? 'active' : ''}`;
            },

            toggleBatchMode() {
                this.batchMode = document.getElementById('batch-toggle').checked;
                document.getElementById('batch-layout').disabled = !this.batchMode;
            },

            showToast(message, type = 'info', duration = 3000) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = message;
                container.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 10); // Animate in

                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.addEventListener('transitionend', () => toast.remove());
                }, duration);
            },

            setBatchLayout(layout) {
                this.batchLayout = layout;
            },

            async loadScans() {
                this.scans = await db.getAll();
                this.renderList();
            },

            renderList(searchTerm = '') {
                const list = document.getElementById('log-content');
                list.innerHTML = '';
                
                const term = searchTerm.toLowerCase();
                const filtered = this.scans
                    .filter(s => {
                        if (this.filter === 'pending') return s.status === 'pending';
                        if (this.filter === 'sent') return s.status === 'sent';
                        return true;
                    })
                    .filter(s => s.code_normalized.toLowerCase().includes(term))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                filtered.forEach(scan => {
                    const li = document.createElement('li');
                    li.className = 'log-item';
                    li.innerHTML = `
                        <div class="item-info">
                            <div class="item-code">${scan.code_normalized}</div>
                            <div class="item-meta">
                                <span class="badge badge-${scan.pi_mode.toLowerCase()}">${scan.pi_mode}</span>
                                <span class="badge badge-${scan.status}">${scan.status}</span>
                                ${scan.used ? '<span class="badge badge-used">USED</span>' : ''}
                                <span>${new Date(scan.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            ${!scan.used ? `<button class="btn btn-secondary" onclick="app.markScanUsed(${scan.id})">Mark Used</button>` : ''}
                        </div>
                    `;
                    list.appendChild(li);
                });
            },

            async markScanUsed(scanId) {
                event.stopPropagation(); // Prevent panel from closing if clicked
                await db.markUsed(scanId);
                this.loadScans();
                this.showToast('Marked as used', 'info');
            },

            filterList(type) {
                this.filter = type;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                event.target.classList.add('active');
                this.renderList(document.getElementById('search-input').value);
            },

            // --- SCAN LOGIC ---
            onScan(rawCode) {
                const viewfinder = document.getElementById('viewfinder');
                // 1. Normalize
                const normalized = logic.normalize(rawCode);
                
                // 2. Convert (Try to convert to current mode BEFORE validation)
                let finalCode = logic.convert(normalized, this.mode);
                if (!finalCode) {
                    finalCode = normalized; 
                }

                // 3. Validate (Validate the RESULT of conversion)
                if (!logic.validate(finalCode, this.mode)) {
                    this.showToast(`Invalid ${this.mode} format`, 'error');
                    return;
                }

                // 4. Duplicate Check
                const duplicate = this.scans.find(s => s.code_normalized === finalCode);
                if (duplicate) {
                    this.showToast(`Duplicate found`, 'warning');
                    viewfinder.className = 'warning';
                    setTimeout(() => viewfinder.className = '', 500);
                    if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
                    return;
                }
                this.tempScan = finalCode;

                // 5. Batch Mode Check
                if (this.batchMode) {
                    this.tempScan = finalCode;
                    this.confirmScan(this.batchLayout);
                    this.batchCount++;
                    document.getElementById('batch-counter').innerText = this.batchCount;
                    return;
                }

                // 6. Success -> Ask Layout (For now, we auto-select QWERTY for simplicity)
                this.confirmScan('QWERTY');

                // Visual/Haptic Feedback
                viewfinder.className = 'success';
                setTimeout(() => viewfinder.className = '', 500);
                if(navigator.vibrate) navigator.vibrate(200);
                this.laserSound.currentTime = 0;
                this.laserSound.play().catch(e => console.warn("Audio play failed", e));
            },

            async confirmScan(layout) {
                const record = {
                    code_original: this.tempScan, // simplified for now
                    code_normalized: this.tempScan,
                    pi_mode: this.mode,
                    layout: layout,
                    date: new Date().toISOString(),
                    used: false,
                    dateUsed: null,
                    status: 'pending'
                };

                await db.addScan(record);
                this.loadScans();

                this.showToast(`Saved: ${this.tempScan}`, 'success');
            },

            // --- AUTO SYNC ---
            startAutoSync() {
                if (this.syncIntervalId) return; // Already running
                if (!navigator.onLine) return; // Don't start if offline

                this.syncIntervalId = setInterval(async () => {
                    if (navigator.onLine) {
                        console.log('Auto-sync: Running...');
                        await this.runFullSync(true); // Run in silent mode
                    }
                }, 10000); // 10 seconds
                console.log('Auto-sync: Service started.');
            },

            stopAutoSync() {
                if (this.syncIntervalId) {
                    clearInterval(this.syncIntervalId);
                    this.syncIntervalId = null;
                    console.log('Auto-sync: Service stopped.');
                }
            },

            // --- SYNC LOGIC ---
            async runFullSync(silent = false) {
                const syncBtn = document.getElementById('sync-btn');
                if (syncBtn.disabled) return; // Prevent multiple clicks

                const originalIcon = syncBtn.innerText;
                if (!silent) {
                    syncBtn.innerText = '🔄';
                }
                syncBtn.disabled = true;
                
                const showSyncFeedback = (msg, type) => {
                    if (!silent || type === 'error') this.showToast(msg, type);
                }

                if (!silent) showSyncFeedback('Syncing...', 'info');

                try {
                    // Step 1: Push local changes to the server
                    const pending = this.scans.filter(s => s.status === 'pending');
                    if (pending.length > 0) {
                        if (!silent) showFeedback(`Pushing ${pending.length} items...`, 'text-secondary');
                        const pushResult = await this.pushToServer(pending, true); // silent mode for sub-op
                        if (!pushResult.success) {
                            throw new Error(`Push failed: ${pushResult.message}`);
                        }
                    }

                    // Step 2: Pull all data from the server
                    if (!silent) showFeedback('Fetching from cloud...', 'text-secondary');
                    const serverScans = await this.pullFromServer(silent);
                    if (serverScans === null) { // pullFromServer returns null on failure
                        throw new Error("Pull from server failed. Check console.");
                    }

                    // Step 3: Merge server data into local DB
                    if (!silent) showFeedback('Merging data...', 'text-secondary');
                    const newItems = await this.mergeScans(serverScans);
                    
                    if (!silent) {
                        showSyncFeedback(`Sync complete. ${newItems} new items added.`, 'success');
                    } else if (newItems > 0) {
                        console.log(`Auto-sync: Merged ${newItems} new items from server.`);
                    }

                } catch (e) {
                    console.error('Full sync failed:', e);
                    showFeedback(`Sync Failed: ${e.message}`, 'danger');
                } finally {
                    syncBtn.innerText = originalIcon;
                    syncBtn.disabled = false;
                }
            },

            async pullFromServer(silent = false) {
                const url = logic.settings.scriptUrl;
                if (!url) {
                    if (!silent) alert('Please configure Google Apps Script URL in Settings.');
                    return null;
                }

                try {
                    // NOTE: Your Google Apps Script must be deployed to handle GET requests
                    // and return JSON with correct CORS headers.
                    const response = await fetch(url, { mode: 'cors' }); 
                    if (!response.ok) {
                        throw new Error(`Server responded with status: ${response.status}`);
                    }
                    const data = await response.json();
                    // Expecting format: { records: [...] }
                    return data.records || [];
                } catch (e) {
                    console.error('Failed to pull data from server:', e);
                    if (!silent) {
                        alert(`Failed to fetch data from the cloud. Make sure the Apps Script is configured for GET requests and CORS.\nError: ${e.message}`);
                    }
                    return null; // Indicate failure
                }
            },

            async scanImageFile(event) {
                if (!event.target.files || event.target.files.length === 0) {
                    return;
                }
                const imageFile = event.target.files[0];

                this.showToast('Scanning image...', 'info');

                try {
                    // Temporarily stop the video scanner to avoid conflicts
                    if (this.scanner && this.scanner.isScanning) {
                        await this.scanner.stop();
                    }
                    const html5QrCode = new Html5Qrcode("reader");
                    const decodedText = await html5QrCode.scanFile(imageFile, true); // showImage = true
                    this.onScan(decodedText);
                } catch (err) {
                    console.error('File scan error:', err);
                    this.showToast('No barcode found in image.', 'error');
                } finally {
                    this.startScanner(); // Restart video scanner
                    event.target.value = ''; // Clear input to allow re-scanning same file
                }
            },

            async mergeScans(serverScans) {
                const localCodes = new Set(this.scans.map(s => s.code_normalized));
                let newScansAdded = 0;

                for (const serverScan of serverScans) {
                    if (serverScan.code_normalized && !localCodes.has(serverScan.code_normalized)) {
                        const newRecord = { code_original: serverScan.code_original || serverScan.code_normalized, code_normalized: serverScan.code_normalized, pi_mode: serverScan.pi_mode || 'UNKNOWN', layout: serverScan.layout || 'UNKNOWN', date: serverScan.date || new Date().toISOString(), used: serverScan.used || false, dateUsed: serverScan.dateUsed || null, status: 'sent' };
                        await db.addScan(newRecord);
                        newScansAdded++;
                    }
                }
                if (newScansAdded > 0) { await this.loadScans(); }
                return newScansAdded;
            },

            async syncToScript() { // This is called from the modal
                const pending = this.scans.filter(s => s.status === 'pending');
                if (pending.length === 0) { alert('No pending items to sync.'); return; }

                const btn = document.querySelector('#sync-modal .btn-primary');
                const originalText = btn.innerText;
                btn.innerText = 'Sending...';
                btn.disabled = true;

                const result = await this.pushToServer(pending);

                if (result.success && result.count > 0) {
                    this.openSyncModal(); // Refresh list
                    alert(`Successfully synced ${result.count} items!`);
                }
                
                btn.innerText = originalText;
                btn.disabled = false;
            },

            async pushToServer(itemsToPush, silent = false) {
                if (!itemsToPush || itemsToPush.length === 0) return { success: true, message: "No items to push." };
                const url = logic.settings.scriptUrl;
                if (!url) {
                    if (!silent) alert('Please configure Google Apps Script URL in Settings.');
                    return { success: false, message: 'Script URL not configured.' };
                }
                try {
                    // IMPORTANT: This now uses 'cors' mode. Your Google Apps Script must be configured for CORS.
                    const response = await fetch(url, { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ records: itemsToPush }) });
                    if (!response.ok) throw new Error(`Server returned status ${response.status}`);
                    for (const item of itemsToPush) { await db.updateStatus(item.id, 'sent'); }
                    await this.loadScans();
                    return { success: true, count: itemsToPush.length };
                } catch (e) {
                    console.error('Push to server failed:', e);
                    if (!silent) alert('Push to server failed: ' + e.message);
                    return { success: false, message: e.message };
                }
            },

            exportCSV() {
                const headers = ['ID', 'Code', 'Mode', 'Layout', 'Date', 'Status', 'Used'];
                const rows = this.scans.map(s => [
                    s.id, s.code_normalized, s.pi_mode, s.layout, s.date, s.status, s.used
                ]);
                
                const csvContent = [
                    headers.join(','),
                    ...rows.map(r => r.join(','))
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `barra_export_${new Date().toISOString().slice(0,10)}.csv`;
                a.click();
            },

            async clearDatabase() {
                if(confirm('Are you sure? This will delete ALL history.')) {
                    await db.clear();
                    this.loadScans();
                }
            },

            async startScanner() {
                this.scanner = new Html5Qrcode("reader");
                const config = { 
                    fps: 10,
                    // No qrbox needed, we use a CSS overlay
                };

                try {
                    const cameras = await Html5Qrcode.getCameras();
                    if (cameras && cameras.length) {
                        let cameraId = cameras[0].id; // Fallback to first camera
                        // Prefer back camera
                        const backCamera = cameras.find(c => c.label.toLowerCase().includes('back'));
                        if (backCamera) {
                            cameraId = backCamera.id;
                        }
                        
                        await this.scanner.start(
                            cameraId, 
                            config,
                            (decodedText) => this.onScan(decodedText),
                            (errorMessage) => { /* ignore scan errors */ }
                        );
                    } else {
                        this.showToast('No cameras found on this device.', 'error');
                    }
                } catch (err) {
                    console.error("Camera start error:", err);
                    this.showToast(`Camera Error: ${err.name}`, 'error');
                }
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
