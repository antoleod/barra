<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Barra Scanner</title>
<meta name="theme-color" content="#0b0d10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.webmanifest" />
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="scanner-view"><div id="reader"></div></div>
<div class="overlay">
  <div class="top"><div class="pill"><span id="dot" class="dot"></span><span>Barra Scanner</span></div><button class="icon-btn" id="sync-btn">⟳</button></div>
  <div class="stage"><div id="frame"></div></div>
  <div class="status"><div class="shead"><span id="mode-tag">MODO FULL</span><span id="offline" style="display:none;color:#ff9ca8;font-weight:700">SIN CONEXION</span></div><div id="live" class="live">Listo para escanear</div><div class="metrics"><span class="m" id="m-total">0 registros</span><span class="m" id="m-pending">0 pendientes</span><span class="m" id="m-batch">Batch off</span></div></div>
</div>
<div id="flash"></div><div id="toast"></div><div id="backdrop" class="backdrop"></div>
<section id="history" class="panel" aria-hidden="true"><header class="ph"><div class="title">Historial</div><button class="icon-btn" data-close="history">✕</button></header><div class="pc"><input id="search" class="input" placeholder="Buscar codigo" /><div class="tabs"><button class="tab on" data-filter="all">Todo</button><button class="tab" data-filter="pending">Pendientes</button><button class="tab" data-filter="sent">Enviados</button></div><ul id="log"></ul></div></section>
<section id="settings" class="panel" aria-hidden="true"><header class="ph"><div class="title">Ajustes</div><button class="icon-btn" data-close="settings">✕</button></header><div class="pc">
<div style="margin-bottom:14px"><label class="label">Modo de escaneo</label><div class="seg"><button id="mode-full" class="mode on" type="button">FULL PI</button><button id="mode-short" class="mode" type="button">SHORT</button></div></div>
<div style="margin-bottom:14px"><label class="label">Batch</label><div class="row"><span>Activar escaneo por lote</span><label class="sw"><input type="checkbox" id="batch-toggle" /><span class="sl"></span></label></div><select id="batch-layout" class="select" disabled><option value="QWERTY">QWERTY</option><option value="AZERTY">AZERTY</option><option value="QWERTZU">QWERTZU</option></select></div>
<div style="margin-bottom:14px"><label class="label">Google Apps Script URL</label><input id="script-url" class="input" placeholder="https://script.google.com/.../exec" /></div>
<div style="margin-bottom:14px"><label class="label">Validacion</label><div class="row"><span>OCR correction (O a 0)</span><label class="sw"><input type="checkbox" id="ocr-toggle" /><span class="sl"></span></label></div><input id="full-prefix" class="input" placeholder="Full prefix" /><input id="short-prefix" class="input" placeholder="Short prefix" style="margin-top:8px" /></div>
<div><label class="label">Datos locales</label><button id="export-btn" class="btn" style="width:100%;margin-bottom:8px">Exportar CSV</button><button id="clear-btn" class="btn btn-danger" style="width:100%">Borrar historial local</button></div>
</div></section>
<nav id="nav"><button class="n" id="n-history"><span>▦</span><span>Historial</span></button><button class="n" id="n-image"><span>◩</span><span>Imagen</span></button><button class="n" id="n-sync"><span>↻</span><span>Sync</span></button><button class="n" id="n-settings"><span>⚙</span><span>Ajustes</span></button><input id="file" type="file" accept="image/*" style="display:none" /></nav>
<script>
const db={dbName:"BarraScannerDB",version:1,instance:null,init(){return new Promise((r,j)=>{const q=indexedDB.open(this.dbName,this.version);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains("scans")){const s=d.createObjectStore("scans",{keyPath:"id",autoIncrement:true});s.createIndex("code_normalized","code_normalized",{unique:false});s.createIndex("status","status",{unique:false});}};q.onsuccess=e=>{this.instance=e.target.result;r(this.instance)};q.onerror=e=>j(e)})},addScan(x){return new Promise((r,j)=>{const t=this.instance.transaction(["scans"],"readwrite");const q=t.objectStore("scans").add(x);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})},getAll(){return new Promise(r=>{const q=this.instance.transaction(["scans"],"readonly").objectStore("scans").getAll();q.onsuccess=()=>r(q.result||[])})},async updateStatus(id,status){const t=this.instance.transaction(["scans"],"readwrite").objectStore("scans");const item=await new Promise(r=>{const q=t.get(id);q.onsuccess=e=>r(e.target.result)});if(item){item.status=status;t.put(item)}},async markUsed(id){const t=this.instance.transaction(["scans"],"readwrite").objectStore("scans");const item=await new Promise(r=>{const q=t.get(id);q.onsuccess=e=>r(e.target.result)});if(item){item.used=true;item.dateUsed=new Date().toISOString();t.put(item)}},clear(){return new Promise(r=>{const t=this.instance.transaction(["scans"],"readwrite");t.objectStore("scans").clear();t.oncomplete=r})}};
const logic={settings:{fullPrefix:"02PI20",shortPrefix:"MUSTBRUN",ocrCorrection:true,formUrl:"",scriptUrl:"https://script.google.com/macros/s/AKfycbzAGUpxnCXDsr7llJlh_75rKdnwd5xJJIxWJVXy9ekUzqII6lTCpAiKVuYVfGQ_V8dWwA/exec"},loadSettings(){const s=localStorage.getItem("barra_settings");if(s)this.settings={...this.settings,...JSON.parse(s)};document.getElementById("full-prefix").value=this.settings.fullPrefix;document.getElementById("short-prefix").value=this.settings.shortPrefix;document.getElementById("ocr-toggle").checked=this.settings.ocrCorrection;document.getElementById("script-url").value=this.settings.scriptUrl||""},saveSettings(){this.settings.fullPrefix=document.getElementById("full-prefix").value.trim();this.settings.shortPrefix=document.getElementById("short-prefix").value.trim();this.settings.ocrCorrection=document.getElementById("ocr-toggle").checked;this.settings.scriptUrl=document.getElementById("script-url").value.trim();localStorage.setItem("barra_settings",JSON.stringify(this.settings))},normalize(code){let c=(code||"").trim().toUpperCase().replace(/\s+/g,"");if(this.settings.ocrCorrection)c=c.replace(/O/g,"0");return c},convert(code,targetMode){const c=this.normalize(code),f=this.settings.fullPrefix,s=this.settings.shortPrefix,isFull=c.startsWith(f),isShort=c.startsWith(s)||(!isFull&&/^[A-Z0-9]+$/.test(c));if(targetMode==="SHORT"){if(isShort)return c;if(isFull){const core=c.substring(f.length,c.length-2);return s+core}}else{if(isFull)return c;if(isShort){let core=c;if(c.startsWith(s))core=c.substring(s.length);return f+core+"00"}}return null},validate(code,mode){const c=this.normalize(code);if(c.length<5)return false;if(mode==="FULL"&&!c.startsWith(this.settings.fullPrefix))return false;return true}};
const app={mode:"FULL",scans:[],tempScan:null,filter:"all",scanner:null,scannerState:"idle",batchMode:false,batchCount:0,batchLayout:"QWERTY",syncIntervalId:null,isHandling:false,lastCode:"",lastAt:0,restartTimer:null,pauseMs:1300,
async init(){await db.init();logic.loadSettings();this.bind();await this.loadScans();this.updateOnline();await this.startScanner();this.startAutoSync();this.registerSW()},bind(){const $=id=>document.getElementById(id);$("sync-btn").onclick=()=>this.runFullSync();$("n-sync").onclick=()=>this.runFullSync();$("search").oninput=e=>this.renderList(e.target.value);$("n-history").onclick=()=>{this.show("history");this.setNav("n-history")};$("n-settings").onclick=()=>{this.show("settings");this.setNav("n-settings")};$("n-image").onclick=()=>{$("file").click();this.setNav("n-image")};$("file").onchange=e=>this.scanImage(e);$("backdrop").onclick=()=>this.close();document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>this.close());document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>this.filterList(t.dataset.filter||"all"));$("mode-full").onclick=()=>this.setMode("FULL");$("mode-short").onclick=()=>this.setMode("SHORT");$("batch-toggle").onchange=()=>this.toggleBatch();$("batch-layout").onchange=e=>this.batchLayout=e.target.value;document.querySelectorAll(".input,.select").forEach(el=>{el.onchange=()=>logic.saveSettings();el.onblur=()=>logic.saveSettings()});$("ocr-toggle").onchange=()=>logic.saveSettings();$("export-btn").onclick=()=>this.exportCSV();$("clear-btn").onclick=()=>this.clearDB();window.addEventListener("online",()=>{this.updateOnline();this.startAutoSync()});window.addEventListener("offline",()=>{this.updateOnline();this.stopAutoSync()})},registerSW(){if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{})}},setNav(id){document.querySelectorAll("#nav .n").forEach(b=>b.classList.toggle("on",b.id===id));if(id==="n-image")setTimeout(()=>document.querySelectorAll("#nav .n").forEach(b=>b.classList.remove("on")),500)},status(text){document.getElementById("live").textContent=text},updateMetrics(){const p=this.scans.filter(s=>s.status==="pending").length;document.getElementById("m-total").textContent=`${this.scans.length} registros`;document.getElementById("m-pending").textContent=`${p} pendientes`;document.getElementById("m-batch").textContent=this.batchMode?`Batch ${this.batchCount}`:"Batch off"},show(id){this.close(false);const p=document.getElementById(id);p.classList.add("on");p.setAttribute("aria-hidden","false");document.getElementById("backdrop").classList.add("on")},close(reset=true){document.querySelectorAll(".panel.on").forEach(p=>{p.classList.remove("on");p.setAttribute("aria-hidden","true")});document.getElementById("backdrop").classList.remove("on");if(reset)this.setNav("")},toggleBatch(){this.batchMode=document.getElementById("batch-toggle").checked;document.getElementById("batch-layout").disabled=!this.batchMode;if(!this.batchMode)this.batchCount=0;this.updateMetrics()},setMode(m){this.mode=m;document.getElementById("mode-full").classList.toggle("on",m==="FULL");document.getElementById("mode-short").classList.toggle("on",m==="SHORT");document.getElementById("mode-tag").textContent=`MODO ${m}`;this.status(`Modo ${m} activo`)},toast(msg,type="info",dur=2200){const c=document.getElementById("toast"),t=document.createElement("div"),ic=type==="success"?"✓":type==="warning"?"!":type==="error"?"✕":"•";t.className=`t ${type}`;t.innerHTML=`<span>${ic}</span><span>${msg}</span>`;c.appendChild(t);requestAnimationFrame(()=>t.classList.add("show"));setTimeout(()=>{t.classList.remove("show");t.addEventListener("transitionend",()=>t.remove(),{once:true})},dur)},feedback(type="success"){const f=document.getElementById("frame"),flash=document.getElementById("flash");f.classList.remove("success","warning","error");f.classList.add(type);if(type==="success"){flash.classList.add("on");setTimeout(()=>flash.classList.remove("on"),120);if(navigator.vibrate)navigator.vibrate(120);this.beep(940,.05)}if(type==="warning"){if(navigator.vibrate)navigator.vibrate([45,40,45]);this.beep(440,.05)}if(type==="error")this.beep(300,.08);setTimeout(()=>f.classList.remove("success","warning","error"),420)},beep(freq,dur){try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.type="sine";o.frequency.value=freq;g.gain.value=.02;o.connect(g);g.connect(a.destination);o.start();setTimeout(()=>{o.stop();a.close()},dur*1000)}catch(_){}}
,
async pauseScannerTemporarily(ms=this.pauseMs){if(this.restartTimer){clearTimeout(this.restartTimer);this.restartTimer=null}await this.stopScanner();this.restartTimer=setTimeout(()=>{this.startScanner()},ms)},
async loadScans(){this.scans=await db.getAll();this.renderList(document.getElementById("search")?.value||"");this.updateMetrics()},renderList(term=""){const list=document.getElementById("log");list.innerHTML="";const f=this.scans.filter(s=>this.filter==="pending"?s.status==="pending":this.filter==="sent"?s.status==="sent":true).filter(s=>(s.code_normalized||"").toLowerCase().includes(term.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));if(!f.length){const d=document.createElement("div");d.className="item";d.textContent="No hay registros para mostrar.";list.appendChild(d);return}f.forEach(scan=>{const li=document.createElement("li");li.className="item";const dt=new Date(scan.date).toLocaleString([], {year:"2-digit",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});li.innerHTML=`<div class="ih"><div class="code">${scan.code_normalized}</div><div class="time">${dt}</div></div><div class="meta"><span class="badge badge-${String(scan.pi_mode||"SHORT").toLowerCase()}">${scan.pi_mode||"UNK"}</span><span class="badge badge-${scan.status}">${scan.status}</span>${scan.used?'<span class="badge badge-used">USED</span>':''}</div><div style="display:flex;justify-content:flex-end">${!scan.used?`<button class="btn" data-used="${scan.id}">Marcar usado</button>`:""}</div>`;list.appendChild(li)});list.querySelectorAll("[data-used]").forEach(b=>b.onclick=async e=>{e.stopPropagation();await this.markUsed(Number(b.dataset.used))})},async markUsed(id){await db.markUsed(id);await this.loadScans();this.toast("Marcado como usado")},filterList(type){this.filter=type;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.filter===type));this.renderList(document.getElementById("search").value||"")},updateOnline(){const on=navigator.onLine;document.getElementById("dot").classList.toggle("offline",!on);document.getElementById("offline").style.display=on?"none":"inline"},
onScan(raw){if(this.isHandling)return;const now=Date.now();if(raw===this.lastCode&&now-this.lastAt<1200)return;this.lastCode=raw;this.lastAt=now;this.isHandling=true;const n=logic.normalize(raw);let finalCode=logic.convert(n,this.mode);if(!finalCode)finalCode=n;if(!logic.validate(finalCode,this.mode)){this.status(`Codigo invalido (${this.mode})`);this.feedback("error");this.toast(`Formato invalido para ${this.mode}`,"warning");this.pauseScannerTemporarily(800).finally(()=>{this.isHandling=false});return}const dup=this.scans.find(s=>s.code_normalized===finalCode);if(dup){this.status("Codigo duplicado");this.feedback("warning");this.toast("Codigo duplicado","warning");this.pauseScannerTemporarily(900).finally(()=>{this.isHandling=false});return}this.tempScan=finalCode;if(this.batchMode){this.confirm(this.batchLayout).finally(async()=>{this.batchCount++;this.updateMetrics();this.status(`Guardado en batch: ${finalCode}`);this.feedback("success");await this.pauseScannerTemporarily();this.isHandling=false});return}this.confirm("QWERTY").finally(async()=>{this.status(`Guardado: ${finalCode}`);this.feedback("success");await this.pauseScannerTemporarily();this.isHandling=false})},
async confirm(layout){const r={code_original:this.tempScan,code_normalized:this.tempScan,pi_mode:this.mode,layout,date:new Date().toISOString(),used:false,dateUsed:null,status:"pending"};await db.addScan(r);await this.loadScans();this.toast(`Guardado ${this.tempScan}`,"success")},startAutoSync(){if(this.syncIntervalId||!navigator.onLine)return;this.syncIntervalId=setInterval(async()=>{if(navigator.onLine)await this.runFullSync(true)},15000)},stopAutoSync(){if(!this.syncIntervalId)return;clearInterval(this.syncIntervalId);this.syncIntervalId=null},
async runFullSync(silent=false){const a=document.getElementById("sync-btn"),b=document.getElementById("n-sync");if(a.disabled)return;a.disabled=true;b.disabled=true;this.status("Sincronizando...");if(!silent)this.toast("Sincronizando","info",1400);try{const p=this.scans.filter(s=>s.status==="pending");if(p.length){const pr=await this.pushToServer(p,true);if(!pr.success)throw new Error(pr.message||"No se pudo enviar")}const server=await this.pullFromServer(true);if(server===null)throw new Error("No se pudo obtener datos del servidor");const merged=await this.merge(server);this.status(`Sync completo${merged?` (${merged} nuevos)`:""}`);if(!silent)this.toast(`Sync listo${merged?`: ${merged} nuevos`:""}`,"success")}catch(e){this.status("Error de sincronizacion");if(!silent)this.toast(e.message||"Error de sync","error",2800)}finally{a.disabled=false;b.disabled=false}},
async pullFromServer(silent=false){const url=logic.settings.scriptUrl;if(!url){if(!silent)this.toast("Configura la URL de Apps Script","warning");return null}try{const r=await fetch(url,{mode:"cors"});if(!r.ok)throw new Error(`Status ${r.status}`);const d=await r.json();return d.records||[]}catch(e){if(!silent)this.toast(`Error al leer nube: ${e.message}`,"error",2800);return null}},
async pushToServer(items,silent=false){if(!items?.length)return{success:true,message:"No items"};const url=logic.settings.scriptUrl;if(!url){if(!silent)this.toast("Configura la URL de Apps Script","warning");return{success:false,message:"Script URL no configurada"}}try{const r=await fetch(url,{method:"POST",mode:"cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({records:items})});if(!r.ok)throw new Error(`Status ${r.status}`);for(const item of items)await db.updateStatus(item.id,"sent");await this.loadScans();return{success:true,count:items.length}}catch(e){if(!silent)this.toast(`Error al enviar: ${e.message}`,"error",2800);return{success:false,message:e.message}}},
async merge(server){const local=new Set(this.scans.map(s=>s.code_normalized));let add=0;for(const s of server){if(s.code_normalized&&!local.has(s.code_normalized)){await db.addScan({code_original:s.code_original||s.code_normalized,code_normalized:s.code_normalized,pi_mode:s.pi_mode||"UNKNOWN",layout:s.layout||"UNKNOWN",date:s.date||new Date().toISOString(),used:s.used||false,dateUsed:s.dateUsed||null,status:"sent"});add++}}if(add>0)await this.loadScans();return add},
async scanImage(event){const file=event?.target?.files?.[0];if(!file)return;this.toast("Escaneando imagen","info",1500);try{await this.stopScanner();const h=new Html5Qrcode("reader");const decoded=await h.scanFile(file,true);this.onScan(decoded);await h.clear()}catch(_){this.toast("No se detecto codigo en la imagen","warning",2400)}finally{event.target.value="";await this.startScanner();this.setNav("")}},
exportCSV(){const h=["ID","Code","Mode","Layout","Date","Status","Used"],rows=this.scans.map(s=>[s.id,s.code_normalized,s.pi_mode,s.layout,s.date,s.status,s.used]),csv=[h.join(","),...rows.map(r=>r.join(","))].join("\n"),blob=new Blob([csv],{type:"text/csv"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`barra_export_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);this.toast("CSV exportado","success")},
async clearDB(){if(!confirm("Se borrara todo el historial local. Continuar?"))return;await db.clear();this.batchCount=0;await this.loadScans();this.toast("Historial borrado","success")},
async stopScanner(){if(!this.scanner||this.scannerState!=="scanning")return;try{await this.scanner.stop();this.scannerState="stopped"}catch(_){this.scannerState="stopped"}},
async startScanner(){if(this.restartTimer){clearTimeout(this.restartTimer);this.restartTimer=null}if(this.scannerState==="scanning")return;if(!this.scanner)this.scanner=new Html5Qrcode("reader",{verbose:false});const cfg={fps:10,aspectRatio:1.7777778};this.status("Iniciando camara");try{await this.scanner.start({facingMode:{exact:"environment"}},cfg,d=>this.onScan(d),()=>{});this.scannerState="scanning";this.status("Listo para escanear");return}catch(_){}try{await this.scanner.start({facingMode:"environment"},cfg,d=>this.onScan(d),()=>{});this.scannerState="scanning";this.status("Listo para escanear");return}catch(_){}try{const cams=await Html5Qrcode.getCameras();if(!cams?.length)throw new Error("No cameras");const back=cams.find(c=>{const l=String(c.label||"").toLowerCase();return l.includes("back")||l.includes("rear")||l.includes("trase")||l.includes("environment")});await this.scanner.start((back||cams[0]).id,cfg,d=>this.onScan(d),()=>{});this.scannerState="scanning";this.status("Listo para escanear")}catch(err){this.scannerState="error";this.status("No se pudo abrir la camara");this.toast("No se pudo iniciar la camara","error",3000);console.error(err)}}};
document.addEventListener("DOMContentLoaded",()=>app.init().catch(console.error));
</script>
