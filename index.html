﻿<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Barra Scanner</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script>
    try {
      const settings = JSON.parse(localStorage.getItem("barra_settings") || "{}");
      if (settings.theme) document.documentElement.setAttribute("data-theme", settings.theme);
    } catch (_) { }
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app-loader" style="position:fixed;inset:0;background:var(--bg, #0d1117);z-index:9999;display:grid;place-items:center;transition:opacity 0.3s;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--text, #e6edf3);font-family:sans-serif;">
      <div style="width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--accent, #58a6ff);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="font-size:14px;font-weight:500;letter-spacing:0.5px;">LOADING</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <div class="app-shell" style="display: none;">
    <header class="app-header top">
      <div class="pill"><span id="dot" class="dot"></span><span>Barra Scanner</span></div>
      <script src="https://unpkg.com/html5-qrcode"></script>
      <button class="icon-btn" id="sync-btn" aria-label="Sync"><span>⟳</span></button>
    </header>

    <main class="app-main">
      <section class="camera-stage">
        <div id="scanner-view">
          <div id="reader"></div>
        </div>
        <div class="stage">
          <div id="frame"></div>
        </div>
      </section>
      <section class="status-wrap">
        <div class="status">
          <div class="shead"><span id="mode-tag">FULL MODE</span><span id="offline"
              style="display:none;color:#ff9ca8;font-weight:700">NO CONNECTION</span></div>
          <div id="live" class="live">Ready to scan</div>
          <div class="metrics"><span class="m" id="m-total">0 records</span><span class="m" id="m-pending">0
              pending</span><span class="m" id="m-batch">Batch off</span></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <div class="recent-scans-footer">
        <div id="recent-scans-container"><span class="recent-placeholder">Recent records...</span></div>
      </div>
      <nav id="nav"><button class="n" id="n-history"><span>▦</span><span>History</span></button><button class="n"
          id="n-image"><span>◩</span><span>Image</span></button><button class="n"
          id="n-nfc"><span>📡</span><span>NFC</span></button><button class="n"
          id="n-sync"><span>↻</span><span>Sync</span></button><button class="n"
          id="n-settings"><span>⚙</span><span>Settings</span></button><input id="file" type="file" accept="image/*"
          style="display:none" /></nav>
    </footer>
  </div>
  <div id="flash"></div>
  <div id="toast"></div>
  <div id="big-alert" class="big-alert">
    <div id="ba-box" class="ba-box">
      <span id="ba-icon" class="ba-icon">⚠️</span>
      <div id="ba-title" class="ba-title">DUPLICATE</div>
      <div id="ba-code" class="ba-code">...</div>
      <button id="ba-btn" class="ba-btn">CLOSE</button>
    </div>
  </div>
  <div id="confirm-modal" class="big-alert">
    <div class="ba-box">
      <span id="cm-icon" class="ba-icon"></span>
      <div id="cm-title" class="ba-title"></div>
      <p id="cm-message" class="ba-message"></p>
      <div class="ba-actions">
        <button id="cm-cancel-btn" class="btn">Cancel</button>
        <button id="cm-confirm-btn" class="btn btn-danger">Confirm</button>
      </div>
    </div>
  </div>
  <div id="backdrop" class="backdrop"></div>
  <section id="history" class="panel" aria-hidden="true">
    <header class="ph">
      <div class="title">History</div><button class="icon-btn" data-close="history">✕</button>
    </header>
    <div class="pc"><input id="search" class="input" placeholder="Search code" />
      <div class="tabs"><button class="tab on" data-filter="all">All</button><button class="tab"
          data-filter="pending">Pending</button><button class="tab" data-filter="sent">Sent</button></div>
      <ul id="log"></ul>
    </div>
  </section>
  <section id="settings" class="panel" aria-hidden="true">
    <header class="ph">
      <div class="title">Settings</div><button class="icon-btn" data-close="settings">✕</button>
    </header>
    <div class="pc">
      <div class="user-info">
        <img id="user-avatar-img" class="user-avatar" src="" />
        <div style="flex:1">
          <div style="font-size:10px;color:#888">CONNECTED AS</div>
          <div id="user-display-name" class="user-name">...</div>
        </div>
        <button id="logout-btn" class="btn btn-danger" style="padding:6px 12px;font-size:12px">Logout</button>
      </div>
      <div style="margin-bottom:14px"><label class="label">Scan Mode</label>
        <div class="seg"><button id="mode-full" class="mode on" type="button">FULL PI</button><button id="mode-short"
            class="mode" type="button">SHORT</button></div>
      </div>
      <div style="margin-bottom:14px"><label class="label">Batch</label>
        <div class="row"><span>Enable batch scanning</span><label class="sw"><input type="checkbox"
              id="batch-toggle" /><span class="sl"></span></label></div><select id="batch-layout" class="select"
          disabled>
          <option value="QWERTY">QWERTY</option>
          <option value="AZERTY">AZERTY</option>
          <option value="QWERTZU">QWERTZU</option>
        </select>
      </div>
      <div style="margin-bottom:14px"><label class="label">Validation</label>
        <div class="row"><span>OCR correction (O to 0)</span><label class="sw"><input type="checkbox"
              id="ocr-toggle" /><span class="sl"></span></label></div><input id="full-prefix" class="input"
          placeholder="Full prefix" /><input id="short-prefix" class="input" placeholder="Short prefix"
          style="margin-top:8px" />
      </div>
      <div style="margin-bottom:14px"><label class="label">Visual Theme</label>
        <select id="theme-select" class="select">
          <option value="midnight">Midnight Steel</option>
          <option value="sunset">Sunset Ember</option>
          <option value="forest">Forest Neon</option>
          <option value="ice">Ice Graphite</option>
        </select>
      </div>
      <div><label class="label">Local Data</label><button id="export-btn" class="btn"
          style="width:100%;margin-bottom:8px">Export CSV</button>
        <button id="clear-btn" class="btn btn-danger" style="width:100%;margin-bottom:8px">Clear local history</button>
        <button id="clear-cache-btn" class="btn btn-danger" style="width:100%">Clear Cache and Reload</button>
      </div>
    </div>
  </section>
  <script type="module" src="app.js"></script>
</body>

</html>
