﻿﻿﻿<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Barra Scanner</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    try {
      const settings = JSON.parse(localStorage.getItem("barra_settings") || "{}");
      const theme = settings.theme || "midnight";
      document.documentElement.setAttribute("data-theme", theme);
    } catch (_) {
      document.documentElement.setAttribute("data-theme", "midnight");
    }
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app-loader" style="position:fixed;inset:0;background:var(--bg, #0d1117);z-index:9999;display:grid;place-items:center;transition:opacity 0.3s;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--text, #e6edf3);font-family:sans-serif;">
      <div style="width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--accent, #58a6ff);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="font-size:14px;font-weight:500;letter-spacing:0.5px;" data-i18n="loading">LOADING</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <div class="app-shell" style="display: none;">
    <header class="app-header top">
      <div class="pill"><span id="dot" class="dot"></span><span>Barra Scanner</span></div>
      <button class="icon-btn" id="sync-btn" aria-label="Sync"><span data-i18n="icon_sync">⟳</span></button>
    </header>

    <main class="app-main">
      <section class="camera-stage">
        <div id="scanner-view">
          <div id="reader"></div>
        </div>
        <div class="stage">
          <div id="frame"></div>
        </div>
      </section>
      <section class="status-wrap">
        <div class="status">
          <div class="shead"><span id="mode-tag">PI FULL</span><span id="profile-tag" class="badge badge-profile">PI-F</span><span id="offline" data-i18n="status_no_internet"
              style="display:none;color:#ff9ca8;font-weight:700">NO CONNECTION</span></div>
          <div id="live" class="live" data-i18n="status_ready">Ready to scan</div>
          <div id="firebase-mode" class="live" style="font-size:0.8rem;color:var(--muted);font-weight:600;">Checking Firebase...</div>
          <div class="metrics"><span class="m" id="m-total">0 records</span><span class="m" id="m-pending">0 pending</span><span class="m" id="m-batch">Batch off</span></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <div class="recent-scans-footer">
        <div id="recent-scans-container"><span class="recent-placeholder" data-i18n="ph_recent">Recent records...</span></div>
      </div>
      <nav id="nav"><button class="n" id="n-history"><span>▦</span><span data-i18n="nav_history">History</span></button><button class="n"
          id="n-image"><span>◩</span><span data-i18n="nav_image">Image</span></button><button class="n"
          id="n-nfc"><span>📡</span><span data-i18n="nav_nfc">NFC</span></button><button class="n"
          id="n-sync"><span>↻</span><span data-i18n="nav_sync">Sync</span></button><button class="n"
          id="n-settings"><span>⚙</span><span data-i18n="nav_settings">Settings</span></button><input id="file" type="file" accept="image/*"
          style="display:none" /></nav>
    </footer>
  </div>
  <div id="flash"></div>
  <div id="toast"></div>
  <div id="big-alert" class="big-alert">
    <div id="ba-box" class="ba-box">
      <span id="ba-icon" class="ba-icon">⚠️</span>
      <div id="ba-title" class="ba-title" data-i18n="alert_duplicate">DUPLICATE</div>
      <div id="ba-code" class="ba-code">...</div>
      <button id="ba-btn" class="ba-btn" data-i18n="btn_close">CLOSE</button>
    </div>
  </div>
  <div id="confirm-modal" class="big-alert">
    <div class="ba-box">
      <span id="cm-icon" class="ba-icon"></span>
      <div id="cm-title" class="ba-title"></div>
      <p id="cm-message" class="ba-message"></p>
      <div class="ba-actions">
        <button id="cm-cancel-btn" class="btn" data-i18n="btn_cancel">Cancel</button>
        <button id="cm-confirm-btn" class="btn btn-danger" data-i18n="btn_confirm">Confirm</button>
      </div>
    </div>
  </div>
  <div id="backdrop" class="backdrop"></div>
  <section id="history" class="panel" aria-hidden="true">
    <header class="ph">
      <div class="title" data-i18n="header_history">History</div><button class="icon-btn" data-close="history">✕</button>
    </header>
    <div class="pc"><input id="search" class="input" placeholder="Search code" data-i18n-ph="ph_search" />
      <select id="type-filter" class="select" style="margin-top:8px">
        <option value="all">All Types</option>
      </select>
      <div class="tabs"><button class="tab on" data-filter="all" data-i18n="tab_all">All</button><button class="tab"
          data-filter="pending" data-i18n="tab_pending">Pending</button><button class="tab" data-filter="sent" data-i18n="tab_sent">Sent</button></div>
      <ul id="log"></ul>
    </div>
  </section>
  <section id="settings" class="panel" aria-hidden="true">
    <header class="ph">
      <div class="title" data-i18n="header_settings">Settings</div><button class="icon-btn" data-close="settings">✕</button>
    </header>
    <div class="pc">
      <div style="margin-bottom:14px">
        <label class="label">Scan Profile</label>
        <select id="scan-profile-select" class="select"></select>
      </div>
      <div id="pi-mode-group" style="margin-bottom:14px">
        <label class="label">PI Conversion Mode</label>
        <div class="seg">
          <button id="mode-full" class="mode on" type="button">FULL PI</button>
          <button id="mode-short" class="mode" type="button">SHORT</button>
        </div>
      </div>
      <div style="margin-bottom:14px">
        <label class="label">Batch</label>
        <div class="row">
          <span>Activar escaneo por lote</span>
          <label class="sw">
            <input type="checkbox" id="batch-toggle" />
            <span class="sl"></span>
          </label>
        </div>
        <select id="batch-layout" class="select" disabled>
          <option value="QWERTY">QWERTY</option>
          <option value="AZERTY">AZERTY</option>
          <option value="QWERTZU">QWERTZU</option>
        </select>
      </div>
      <div style="margin-bottom:14px">
        <label class="label">Google Apps Script URL</label>
        <input id="script-url" class="input" placeholder="https://script.google.com/.../exec" />
      </div>
      <div style="margin-bottom:14px">
        <label class="label">API Scan</label>
        <div class="row">
          <span>Enable API post-process</span>
          <label class="sw">
            <input type="checkbox" id="api-enabled" />
            <span class="sl"></span>
          </label>
        </div>
        <input id="api-endpoint" class="input" placeholder="https://api.example.com/scan" />
        <input id="api-token" class="input" placeholder="Bearer token (optional)" style="margin-top:8px" />
        <input id="api-timeout" class="input" type="number" min="500" max="15000" step="100" placeholder="Timeout ms" style="margin-top:8px" />
        <div id="api-response" style="margin-top:8px;font-size:0.78rem;color:var(--muted);min-height:18px;"></div>
      </div>
      <div style="margin-bottom:14px">
        <label class="label">Validacion</label>
        <div class="row">
          <span>OCR correction (O a 0)</span>
          <label class="sw">
            <input type="checkbox" id="ocr-toggle" />
            <span class="sl"></span>
          </label>
        </div>
        <input id="full-prefix" class="input" placeholder="Full prefix" />
        <input id="short-prefix" class="input" placeholder="Short prefix" style="margin-top:8px" />
      </div>
      <div>
        <label class="label">Datos locales</label>
        <button id="export-btn" class="btn" style="width:100%;margin-bottom:8px">Exportar CSV</button>
        <button id="clear-btn" class="btn btn-danger" style="width:100%">Borrar historial local</button>
        <button id="refresh-config-btn" class="btn" style="width:100%;margin-top:8px">Recargar Configuración</button>
        <button id="test-scan-btn" class="btn" style="width:100%;margin-top:8px">Test scan (all profiles)</button>
        <button id="copy-logs-btn" class="btn" style="width:100%;margin-top:8px">Copy logs</button>
        <button id="clear-logs-btn" class="btn" style="width:100%;margin-top:8px">Clear logs</button>
      </div>
    </div>
  </section>
  <script type="module" src="app.js"></script>
</body>

</html>
