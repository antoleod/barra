<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <title>Login - Barra Scanner</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0b0d10" />
    <script>
        try {
            const settings = JSON.parse(localStorage.getItem("barra_settings") || "{}");
            if (settings.theme) document.documentElement.setAttribute("data-theme", settings.theme);
        } catch (_) { }
    </script>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="app-loader" style="position:fixed;inset:0;background:var(--bg, #0d1117);z-index:9999;display:grid;place-items:center;transition:opacity 0.3s;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--text, #e6edf3);font-family:sans-serif;">
          <div style="width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--accent, #58a6ff);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          <div style="font-size:14px;font-weight:500;letter-spacing:0.5px;">VERIFYING</div>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <div class="login-container" style="display: none;">
        <div class="login-card">
            <div class="login-header">
                <div class="logo" aria-hidden="true">&#128225;</div>
                <div class="title">Barra Scanner</div>
            </div>

            <div class="segmented-control">
                <button id="tab-google" class="active">Google</button>
                <button id="tab-pin">User and PIN</button>
            </div>

            <div id="form-google">
                <button id="btn-google" class="btn-primary">
                    <span>G</span>
                    <span>Continue with Google</span>
                </button>
            </div>

            <div id="form-pin" style="display: none; flex-direction: column; gap: 16px;">
                <div class="form-group">
                    <input id="pin-user" class="input" placeholder="Username" autocomplete="username" />
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <input id="pin-code" type="password" class="input" placeholder="6-digit PIN" maxlength="6"
                            autocomplete="current-password" />
                        <button id="toggle-pin-vis" class="toggle-vis" aria-label="Show or hide PIN">&#128065;</button>
                    </div>
                </div>
                <button id="btn-pin-login" class="btn-primary">Enter / Create</button>
                <div class="form-helper-text">If user does not exist, it will be created automatically.</div>
            </div>
            <div id="login-status" class="login-status"></div>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>

</html>
